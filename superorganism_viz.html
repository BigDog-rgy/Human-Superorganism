'color:#e6edf3'>Eurasian Resistance Arc</span><br><span style='color:#8b949e;font-size:11px'>Selective engagement — OPEC+ coordination with Russia while maintaining Western security ties</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-02</span>&nbsp;<span style='color:#e6edf3'>US-China Strategic Bifurcation</span><br><span style='color:#8b949e;font-size:11px'>Swing actor courted by both sides for energy supply and investment capital</span></div><div style='color:#e6edf3;font-weight:600;margin-top:14px;margin-bottom:2px'>Cell Assemblies</div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Saudi Aramco<span style='color:#6e7681'> — World's largest oil producer and primary lever for energy market influence</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; OPEC+<span style='color:#6e7681'> — Cartel coordination assembly for global oil supply management</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Public Investment Fund (PIF)<span style='color:#6e7681'> — Sovereign wealth vehicle for cross-border capital deployment and economic diversification</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Vision 2030<span style='color:#6e7681'> — Domestic transformation assembly for post-oil economic restructuring</span></div></div>", "Sam Altman": "<div style='max-width:360px;font-family:sans-serif;font-size:13px;color:#e6edf3;line-height:1.5'><div style='font-size:16px;font-weight:700;margin-bottom:2px'>Sam Altman</div><div style='color:#8b949e;font-size:11px;margin-bottom:10px'>US &nbsp;&middot;&nbsp; <span style='color:#4a90d9'>West</span></div><div style='color:#e6edf3;font-style:italic;margin-bottom:6px'>Frontier capability neuron — generates the most advanced AI signals that propagate across all sectors and force global policy responses</div><div style='color:#8b949e;font-size:11px;margin-bottom:14px'>Burst-firing excitatory neuron — each model release sends high-amplitude capability shocks through the global system</div><div style='color:#e6edf3;font-weight:600;margin-bottom:2px'>Phase Sequences</div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-01</span>&nbsp;<span style='color:#e6edf3'>Global AI Supremacy</span><br><span style='color:#8b949e;font-size:11px'>Primary capability driver — OpenAI's model releases define the frontier and set the pace of the race</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-09</span>&nbsp;<span style='color:#e6edf3'>Information & Narrative Control</span><br><span style='color:#8b949e;font-size:11px'>AI-generated content and chatbot interfaces reshape how information is produced and consumed</span></div><div style='color:#e6edf3;font-weight:600;margin-top:14px;margin-bottom:2px'>Cell Assemblies</div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; OpenAI<span style='color:#6e7681'> — Leading frontier AI lab and primary driver of PS-01 capability advances</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Microsoft<span style='color:#6e7681'> — Strategic infrastructure partner providing compute and distribution for OpenAI models</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Worldcoin<span style='color:#6e7681'> — Digital identity and financial inclusion initiative with global ambitions</span></div></div>", "Satya Nadella": "<div style='max-width:360px;font-family:sans-serif;font-size:13px;color:#e6edf3;line-height:1.5'><div style='font-size:16px;font-weight:700;margin-bottom:2px'>Satya Nadella</div><div style='color:#8b949e;font-size:11px;margin-bottom:10px'>US &nbsp;&middot;&nbsp; <span style='color:#4a90d9'>West</span></div><div style='color:#e6edf3;font-style:italic;margin-bottom:6px'>Infrastructure integration neuron — embeds AI capability into the global enterprise substrate through cloud and software distribution</div><div style='color:#8b949e;font-size:11px;margin-bottom:14px'>Tonic-firing facilitatory neuron — steady, pervasive signaling that enables other neurons and assemblies to function at higher capacity</div><div style='color:#e6edf3;font-weight:600;margin-bottom:2px'>Phase Sequences</div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-01</span>&nbsp;<span style='color:#e6edf3'>Global AI Supremacy</span><br><span style='color:#8b949e;font-size:11px'>Primary infrastructure provider and distribution channel for frontier AI into enterprise and government</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-07</span>&nbsp;<span style='color:#e6edf3'>Semiconductor Sovereignty Race</span><br><span style='color:#8b949e;font-size:11px'>Major demand-side actor whose compute requirements shape chip procurement and data center buildout</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-09</span>&nbsp;<span style='color:#e6edf3'>Information & Narrative Control</span><br><span style='color:#8b949e;font-size:11px'>AI integration into productivity tools reshapes how information is created and processed at scale</span></div><div style='color:#e6edf3;font-weight:600;margin-top:14px;margin-bottom:2px'>Cell Assemblies</div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Microsoft<span style='color:#6e7681'> — World's most valuable company and primary enterprise AI distribution platform</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Azure Cloud<span style='color:#6e7681'> — Cloud infrastructure assembly providing compute backbone for AI deployment globally</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; GitHub<span style='color:#6e7681'> — Developer platform assembly shaping global software production and AI code integration</sp nt-style:italic;margin-bottom:6px'>Regional escalation neuron — fires high-intensity security signals that reshape Middle Eastern alliances and force global diplomatic responses</div><div style='color:#8b949e;font-size:11px;margin-bottom:14px'>Burst-firing excitatory neuron — crisis-driven, high-amplitude signaling that triggers cascading responses across regional and global assemblies</div><div style='color:#e6edf3;font-weight:600;margin-bottom:2px'>Phase Sequences</div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-06</span>&nbsp;<span style='color:#e6edf3'>Middle East Power Realignment</span><br><span style='color:#8b949e;font-size:11px'>Primary catalyst — Gaza operations and Iran strategy are reshaping the entire regional security architecture</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-10</span>&nbsp;<span style='color:#e6edf3'>Western Alliance Reformation</span><br><span style='color:#8b949e;font-size:11px'>Stress-tests Western alliance cohesion through divergent responses to Israeli military operations</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-05</span>&nbsp;<span style='color:#e6edf3'>Eurasian Resistance Arc</span><br><span style='color:#8b949e;font-size:11px'>Adversarial target — Israeli actions against Iran and proxies directly confront the Axis of Resistance</span></div><div style='color:#e6edf3;font-weight:600;margin-top:14px;margin-bottom:2px'>Cell Assemblies</div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; IDF (Israel Defense Forces)<span style='color:#6e7681'> — Primary military instrument for Gaza operations and regional force projection</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Mossad<span style='color:#6e7681'> — Intelligence assembly for covert operations, Iranian containment, and strategic disruption</span></div><div style='margin-top:3px;color:#8b949e;font-size:11px'>&middot; Likud<span style='color:#6e7681'> — Political assembly providing domestic mandate and coalition governance</span></div></div>", "Ali Khamenei": "<div style='max-width:360px;font-family:sans-serif;font-size:13px;color:#e6edf3;line-height:1.5'><div style='font-size:16px;font-weight:700;margin-bottom:2px'>Ali Khamenei</div><div style='color:#8b949e;font-size:11px;margin-bottom:10px'>Middle East &nbsp;&middot;&nbsp; <span style='color:#e05252'>East</span></div><div style='color:#e6edf3;font-style:italic;margin-bottom:6px'>Asymmetric resistance neuron — sustains proxy network signaling that destabilizes regional order and constrains Western and Israeli freedom of action</div><div style='color:#8b949e;font-size:11px;margin-bottom:14px'>Tonic-firing inhibitory neuron — persistent, low-to-medium amplitude signaling through distributed proxy networks that impose costs on adversaries</div><div style='color:#e6edf3;font-weight:600;margin-bottom:2px'>Phase Sequences</div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-06</span>&nbsp;<span style='color:#e6edf3'>Middle East Power Realignment</span><br><span style='color:#8b949e;font-size:11px'>Central antagonist — proxy network and nuclear program are primary drivers of regional instability</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-05</span>&nbsp;<span style='color:#e6edf3'>Eurasian Resistance Arc</span><br><span style='color:#8b949e;font-size:11px'>Key partner in Russia-China-Iran axis — provides regional disruption capability and sanctions evasion cooperation</span></div><div style='margin-top:6px'><span style='color:#58a6ff;font-weight:600;font-size:11px'>PS-08</span>&nbsp;<span style='color:#e6edf3'>Global Energy Transition</span><br><span style='color:#8b949e;font-size:11px'>Threat to energy security — Houthi attacks on shipping and Strait of Hormuz risk disrupt global oil flows   var mouseX = 0, mouseY = 0;

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    var tip = document.getElementById('custom-tooltip');
    if (tip && tip.style.display === 'block') positionTooltip(tip);
  });

  function positionTooltip(tip) {
    var pad = 18, tw = tip.offsetWidth, th = tip.offsetHeight;
    var vw = window.innerWidth, vh = window.innerHeight;
    var x = mouseX + pad, y = mouseY - pad;
    if (x + tw > vw - pad) x = mouseX - tw - pad;
    if (y + th > vh - pad) y = vh - th - pad;
    if (y < pad) y = pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  function showTooltip(html) {
    var tip = document.getElementById('custom-tooltip');
    tip.innerHTML = html;
    tip.style.display = 'block';
    positionTooltip(tip);
  }

  function hideTooltip() {
    var tip = document.getElementById('custom-tooltip');
    if (tip) tip.style.display = 'none';
  }

  // Poll until vis.js network object is ready, then attach listeners.
  // (window.load is unreliable — network may not have its event system ready yet.)

    if (typeof network !== 'undefined' && network.body && network.on) {
      clearInterval(poll);
      attachListeners();

    if (pollCount > 100) clearInterval(poll);  // give up after 5s
  }, 50);

  function attachListeners() {

    });
    network.on('blurEdge',  hideTooltip);
    network.on('dragStart', hideTooltip);
  }
})();
</script>
